<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tap a phrase to hear how it sounds.</title>
  <style>
    :root {
      --bg: #f7f1e8;
      --card: #fffdf8;
      --ink: #263238;
      --muted: #6f7f8c;
      --accent: #5b8def;
      --accent-dark: #3267c9;
      --warm: #f6c56f;
      --line: #27313a;
      --shadow: 0 16px 34px rgba(61, 73, 88, 0.12);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 8%, rgba(181, 167, 242, 0.22), transparent 28%),
        radial-gradient(circle at 88% 12%, rgba(143, 214, 189, 0.22), transparent 30%),
        linear-gradient(135deg, #f7f1e8 0%, #eef6fb 55%, #f4f0ff 100%);
    }

    .page {
      width: min(1480px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 48px;
    }

    header {
      margin-bottom: 26px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2.05rem, 3.35vw, 3.65rem);
      line-height: 1.04;
      letter-spacing: 0;
      max-width: none;
      white-space: nowrap;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.7;
      max-width: 680px;
    }

    .notice {
      display: none;
      margin: 20px 0 0;
      padding: 12px 14px;
      border-radius: 12px;
      background: #fff2d7;
      color: #75521c;
      border: 1px solid rgba(246, 197, 111, 0.65);
      font-size: 0.95rem;
    }

    .notice.show {
      display: block;
    }

    .deck-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 22px 0 0;
    }

    .deck-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(91, 141, 239, 0.25);
      background: rgba(255, 255, 255, 0.62);
      color: #36516d;
      text-decoration: none;
      font-weight: 750;
      box-shadow: 0 8px 18px rgba(61, 73, 88, 0.08);
    }

    .deck-link.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 640px), 1fr));
      gap: 22px;
      align-items: stretch;
    }

    .card {
      background: rgba(255, 253, 248, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.86);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 190px;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(91, 141, 239, 0.06), transparent 42%),
        radial-gradient(circle at 96% 96%, rgba(246, 197, 111, 0.16), transparent 34%);
    }

    .content,
    .visual {
      position: relative;
      z-index: 1;
    }

    .phrase-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    .phrase {
      flex: 1 1 auto;
      min-width: 0;
      margin: 0;
      font-size: clamp(1.35rem, 1.35vw, 1.75rem);
      line-height: 1.06;
      letter-spacing: 0;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-decoration-thickness: 3px;
      text-decoration-color: rgba(91, 141, 239, 0.22);
      text-underline-offset: 5px;
    }

    .phrase:hover {
      color: var(--accent-dark);
      text-decoration-line: underline;
    }

    .ipa {
      margin: 0 0 15px;
      color: #82909b;
      font-size: 0.98rem;
    }

    .meaning {
      display: inline-flex;
      margin: 0 0 16px;
      padding: 9px 12px;
      border-radius: 12px;
      background: rgba(143, 214, 189, 0.22);
      color: #245a4a;
      font-weight: 700;
      line-height: 1.5;
    }

    .scenario {
      margin: 0 0 16px;
      padding: 13px 14px;
      border-radius: 14px;
      background: rgba(238, 246, 251, 0.9);
      border: 1px solid rgba(91, 141, 239, 0.12);
      color: #526270;
      font-size: 0.95rem;
      line-height: 1.65;
    }

    .example-box {
      padding-top: 4px;
      border-top: 1px dashed rgba(38, 49, 58, 0.2);
    }

    .example-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .example {
      flex: 1 1 auto;
      min-width: 0;
      margin: 0 0 8px;
      font-size: 1.02rem;
      line-height: 1.62;
    }

    .example mark {
      padding: 1px 5px 3px;
      border-radius: 7px;
      background: rgba(246, 197, 111, 0.42);
      color: inherit;
    }

    .translation {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.96rem;
    }

    .sound-btn {
      flex: 0 0 auto;
      border: 0;
      border-radius: 999px;
      padding: 9px 13px;
      background: var(--accent);
      color: #fff;
      font-weight: 750;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(91, 141, 239, 0.25);
      transition: transform 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
      white-space: nowrap;
      font-size: 0.92rem;
    }

    .sound-btn:hover {
      transform: translateY(-1px);
      background: var(--accent-dark);
      box-shadow: 0 10px 22px rgba(91, 141, 239, 0.3);
    }

    .sound-btn.playing {
      background: #23384d;
      animation: pulse 0.8s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from {
        transform: translateY(-1px) scale(1);
      }

      to {
        transform: translateY(-1px) scale(1.045);
      }
    }

    .visual {
      min-height: 100%;
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.26)),
        linear-gradient(145deg, #eff7ff, #fff6df);
      border: 2px solid rgba(38, 49, 58, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
      overflow: hidden;
    }

    svg {
      width: 100%;
      max-width: 205px;
      height: auto;
      overflow: visible;
      filter: drop-shadow(0 12px 18px rgba(61, 73, 88, 0.12));
      transform: rotate(-1deg);
    }

    .visual-limit {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.22)),
        linear-gradient(145deg, #fff4df 0%, #eef6ff 55%, #ffe7e2 100%);
    }

    .visual-plate {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.68), rgba(255, 255, 255, 0.2)),
        linear-gradient(145deg, #eef7ff 0%, #f3edff 52%, #fff5d8 100%);
    }

    .visual-call {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.18)),
        linear-gradient(145deg, #eaf9f2 0%, #f7f1ff 50%, #ffe7e7 100%);
    }

    .visual-available {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.18)),
        linear-gradient(145deg, #eaf5ff 0%, #eaffe8 48%, #fff3d9 100%);
    }

    .visual-loop {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.2)),
        linear-gradient(145deg, #eef4ff 0%, #e8fff4 48%, #fff0dc 100%);
    }

    .visual-async {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.2)),
        linear-gradient(145deg, #fff7df 0%, #edf4ff 50%, #f2ecff 100%);
    }

    .draw {
      fill: none;
      stroke: var(--line);
      stroke-width: 3.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .thin {
      stroke-width: 2.2;
    }

    .fill-blue {
      fill: #a8cff5;
    }

    .fill-yellow {
      fill: #f7d78a;
    }

    .fill-pink {
      fill: #f4b1ad;
    }

    .fill-mint {
      fill: #9bdcc8;
    }

    .fill-purple {
      fill: #c9c1f6;
    }

    .fill-paper {
      fill: #fff7df;
    }

    @media (max-width: 1360px) {
      .card {
        grid-template-columns: minmax(0, 1fr) 220px;
      }
    }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 22px, 1120px);
      }

      .card {
        grid-template-columns: 1fr;
      }

      .visual {
        min-height: 220px;
      }

      svg {
        max-width: 230px;
      }

      h1 {
        white-space: normal;
        font-size: clamp(2rem, 10vw, 3.1rem);
      }
    }

    @media (max-width: 560px) {
      .page {
        padding-top: 24px;
      }

      .card {
        padding: 17px;
        gap: 15px;
        border-radius: 16px;
      }

      .phrase-row,
      .example-row {
        align-items: flex-start;
      }

      .sound-btn {
        width: auto;
        text-align: center;
      }

      .phrase {
        font-size: clamp(1.25rem, 6vw, 1.65rem);
      }

      .visual {
        min-height: 190px;
      }
    }
  </style>
</head>

    const cardsEl = document.querySelector("#cards");
    const deckNav = document.querySelector("#deckNav");
    const speechNotice = document.querySelector("#speechNotice");
    const canPlayAudio = "Audio" in window;
    const currentGroup = getCurrentGroup();

    let activeButton = null;
    let activeAudio = null;

    if (!canPlayAudio) {
      speechNotice.classList.add("show");
    }

    function playAudio(src, button) {
      if (!canPlayAudio) {
        speechNotice.classList.add("show");
        return;
      }

      speechNotice.classList.remove("show");
      stopActiveAudio();
      resetActiveButton();

      if (button) {
        activeButton = button;
        button.dataset.originalText = button.textContent;
        button.textContent = "Playing...";
        button.classList.add("playing");
      }

      activeAudio = new Audio(src);
      activeAudio.preload = "auto";

      activeAudio.addEventListener("ended", () => {
        resetActiveButton();
        activeAudio = null;
      });

      activeAudio.addEventListener("error", () => {
        resetActiveButton();
        activeAudio = null;
        speechNotice.textContent = "音频加载失败，请检查本地音频文件是否存在。";
        speechNotice.classList.add("show");
      });

      activeAudio.play().catch(() => {
        resetActiveButton();
        activeAudio = null;
        speechNotice.textContent = "音频加载失败，请检查本地音频文件是否存在。";
        speechNotice.classList.add("show");
      });
    }

    function stopActiveAudio() {
      if (!activeAudio) return;

      activeAudio.pause();
      activeAudio.currentTime = 0;
      activeAudio = null;
    }

    function resetActiveButton() {
      if (!activeButton) return;

      activeButton.textContent = activeButton.dataset.originalText || "Listen";
      activeButton.classList.remove("playing");
      activeButton = null;
    }

    function escapeRegExp(text) {
      return text.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function highlightPhrase(example, phrase) {
      const pronouns = "(?:one's|my|your|his|her|our|their)";
      const flexiblePhrase = escapeRegExp(phrase).replace("one's", pronouns).replace(/\\s\\+/g, "\\s+");
      const pattern = new RegExp("(" + flexiblePhrase + ")", "i");
      return escapeHtml(example).replace(pattern, "<mark>$1</mark>");
    }

    function getCurrentGroup() {
      const group = Number(new URLSearchParams(window.location.search).get("set"));
      return [1, 2, 3].includes(group) ? group : 1;
    }

    function renderDeckNav() {
      const labels = {
        1: "第 1 页",
        2: "第 2 页",
        3: "第 3 页"
      };

      deckNav.innerHTML = [1, 2, 3].map(group => `
        <a class="deck-link ${group === currentGroup ? "active" : ""}" href="?set=${group}">
          ${labels[group]}
        </a>
      `).join("");
    }

    function renderCards() {
      const visiblePhrases = phrases.filter(item => item.group === currentGroup);

      cardsEl.innerHTML = visiblePhrases.map(item => `
        <article class="card">
          <div class="content">
            <div class="phrase-row">
              <h2 class="phrase" tabindex="0" title="${escapeHtml(item.phrase)}" data-audio="${escapeHtml(item.phraseAudio)}">
                ${escapeHtml(item.phrase)}
              </h2>
              <button class="sound-btn" type="button" data-audio="${escapeHtml(item.phraseAudio)}">
                听短语
              </button>
            </div>

            <p class="ipa">${escapeHtml(item.ipa)}</p>
            <p class="meaning">${escapeHtml(item.meaning)}</p>

            <p class="scenario">
              使用场景说明：${escapeHtml(item.scene)}
            </p>

            <div class="example-box">
              <div class="example-row">
                <p class="example">
                  ${highlightPhrase(item.example, item.phrase)}
                </p>
                <button class="sound-btn" type="button" data-audio="${escapeHtml(item.exampleAudio)}">
                  听例句
                </button>
              </div>
              <p class="translation">${escapeHtml(item.translation)}</p>
            </div>
          </div>

          <div class="visual visual-${escapeHtml(item.illustration)}">
            ${illustration(item.illustration)}
          </div>
        </article>
      `).join("");
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    cardsEl.addEventListener("click", event => {
      const target = event.target.closest("[data-audio]");
      if (!target) return;
      playAudio(target.dataset.audio, target.matches("button") ? target : null);
    });

    cardsEl.addEventListener("keydown", event => {
      if (event.key !== "Enter" && event.key !== " ") return;

      const target = event.target.closest("[data-audio]");
      if (!target) return;

      event.preventDefault();
      playAudio(target.dataset.audio, target.matches("button") ? target : null);
    });

    renderDeckNav();
    renderCards();
  </script>
